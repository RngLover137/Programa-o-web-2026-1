<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculadora de Abastecimento</title>
</head>
<body>
  <div class="container">

    <h1>Calculadora de Abastecimento</h1>

    <div class="campo">
      <label for="combustivel">Tipo de combustível</label>
      <select id="combustivel">
        <option value="">Escolha uma opção</option>
        <option value="gasolina">Gasolina — R$ 6,69/L</option>
        <option value="etanol">Etanol — R$ 4,30/L</option>
        <option value="diesel">Diesel — R$ 6,03/L</option>
      </select>
      <span class="msg-erro" id="erro-combustivel">Selecione um combustível.</span>
    </div>

    <div class="campo">
      <label for="litros">Quantidade (litros)</label>
      <input type="number" id="litros" min="0" step="0.1" placeholder="Ex: 20">
      <span class="msg-erro" id="erro-litros">Insira uma quantidade válida e positiva.</span>
    </div>

    <div class="resultado-box" id="resultado-box">
      <span class="resultado-label">Total</span>
      <span class="resultado-valor" id="resultado">—</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
