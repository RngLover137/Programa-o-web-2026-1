<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback do Curso</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h1>Feedback do Curso</h1>
    <p class="subtitle">Compartilhe sua opinião sobre o curso.</p>

    <nav>
      <a href="/">Enviar Feedback</a>
      <a href="/feedbacks/lista">Ver Feedbacks</a>
    </nav>

    <div class="card">
      <form action="/feedbacks/enviar" method="POST">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

        <label for="comentario">Comentário</label>
        <textarea id="comentario" name="comentario" placeholder="Escreva seu feedback..." required></textarea>

        <button type="submit" class="btn-primary">Enviar Feedback</button>
      </form>
    </div>
  </div>
</body>
</html>
